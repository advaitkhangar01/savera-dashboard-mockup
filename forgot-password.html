<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Savera Retreat Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-form-container">
            <div class="auth-header">
                <div class="brand-logo" style="margin-bottom: 32px;">
                    <i data-lucide="leaf"></i>
                    <span class="brand-text">Savera Retreat</span>
                </div>
                <!-- Back to login link -->
                <a href="login.html" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; font-weight: 500;">
                    <i data-lucide="arrow-left" width="16"></i> Back to login
                </a>
                
                <h1>Reset Password</h1>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form action="login.html" method="GET">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@saveraretreat.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 16px;">
                    Send reset link
                </button>
            </form>
        </div>
        <div class="auth-image">
            <!-- Background Image handled in CSS -->
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
