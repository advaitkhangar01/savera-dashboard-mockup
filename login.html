<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Savera Retreat Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-form-container">
            <div class="auth-header">
                <div class="brand-logo" style="margin-bottom: 32px;">
                    <i data-lucide="leaf"></i>
                    <span class="brand-text">Savera Retreat</span>
                </div>
                <h1>Welcome back</h1>
                <p>Please enter your details to access the dashboard.</p>
            </div>

            <form action="index.html" method="GET">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@saveraretreat.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox"> 
                        <span style="font-size: 0.9rem; color: var(--text-muted);">Remember me</span>
                    </label>
                    <a href="forgot-password.html" style="font-size: 0.9rem; color: var(--primary); font-weight: 500;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 16px;">
                    Sign in
                </button>
            </form>
        </div>
        <div class="auth-image">
            <!-- Background Image handled in CSS -->
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
